<style>
.privacy-badge-fixed{position:fixed;bottom:20px;right:20px;z-index:999999;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.privacy-btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;padding:12px 20px;border-radius:50px;cursor:pointer;font-size:14px;font-weight:600;box-shadow:0 4px 15px rgba(102,126,234,.4);display:flex;align-items:center;gap:8px}
.privacy-btn:hover{transform:translateY(-2px)}
.privacy-popup{display:none;position:absolute;bottom:60px;right:0;background:#fff;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.2);padding:24px;width:320px}
.privacy-popup.active{display:block}
.privacy-popup h3{margin:0 0 16px;color:#667eea}
.privacy-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #eee}
.privacy-check{color:#10b981;font-size:18px}
.privacy-text{flex:1}
.privacy-text strong{display:block;font-size:14px}
.privacy-text span{font-size:12px;color:#666}
.mode-selector{display:flex;gap:8px;margin-top:16px}
.mode-btn{flex:1;padding:10px;border:2px solid #667eea;background:#fff;border-radius:8px;cursor:pointer;font-size:12px}
.mode-btn:hover,.mode-btn.active{background:#667eea;color:#fff}
.close-btn{position:absolute;top:10px;right:10px;background:none;border:none;font-size:24px;cursor:pointer;color:#999}
</style>
<div class="privacy-badge-fixed">
<button class="privacy-btn" id="privacyBtn" onclick="togglePopup()">
<span>&#128274;</span>
<span id="privacyStatus">Privacy Protected</span>
</button>
<div class="privacy-popup" id="privacyPopup">
<button class="close-btn" onclick="togglePopup()">&times;</button>
<h3>&#128274; Privacy & Security</h3>
<div class="privacy-item"><span class="privacy-check">&#10003;</span><div class="privacy-text"><strong>E2EE Encryption</strong><span>End-to-end encrypted search</span></div></div>
<div class="privacy-item"><span class="privacy-check">&#10003;</span><div class="privacy-text"><strong>30+ Trackers Blocked</strong><span>Google, Facebook blocked</span></div></div>
<div class="privacy-item"><span class="privacy-check">&#10003;</span><div class="privacy-text"><strong>Zero Logs Policy</strong><span>No search history</span></div></div>
<div class="privacy-item"><span class="privacy-check">&#10003;</span><div class="privacy-text"><strong>Fake IP Injection</strong><span>Real IP hidden</span></div></div>
<div class="mode-selector">
<button class="mode-btn" onclick="setMode('speed',this)">&#9889; Speed</button>
<button class="mode-btn active" onclick="setMode('balanced',this)">&#9878; Balanced</button>
<button class="mode-btn" onclick="setMode('max',this)">&#128274; Max</button>
</div>
</div>
</div>
<script>
function togglePopup(){document.getElementById("privacyPopup").classList.toggle("active")}
function setMode(mode,btn){
document.cookie="privacy_mode="+mode+";path=/;max-age="+(30*24*60*60);
document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
document.getElementById("privacyStatus").textContent=mode==="max"?"Maximum":mode==="speed"?"Speed Mode":"Protected";
}
</script>
