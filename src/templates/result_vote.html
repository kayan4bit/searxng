<style>
.result-vote{position:absolute;left:-40px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;opacity:.6}
.result-vote:hover{opacity:1}
.vote-btn{width:32px;height:32px;border-radius:50%;border:1px solid #ddd;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#666;transition:all .2s}
.vote-btn:hover{background:#f0f0f0;border-color:#999}
.vote-btn.up:hover,.vote-btn.upvoted{background:#4ade80;color:#fff;border-color:#4ade80}
.vote-btn.down:hover,.vote-btn.downvoted{background:#f87171;color:#fff;border-color:#f87171}
.vote-count{font-size:11px;color:#999;text-align:center}
</style>
<div class="result-vote" id="vote-${result.index}">
<button class="vote-btn up" onclick="voteResult('${result.index}','up')" title="Boost this result">\&#9650;</button>
<span class="vote-count">0</span>
<button class="vote-btn down" onclick="voteResult('${result.index}','down')" title="Lower this result">\&#9660;</button>
</div>
<script>
const voteStore=JSON.parse(localStorage.getItem("atomic_votes")||"{}");
function voteResult(idx,dir){
const key=idx+"_"+dir;
voteStore[key]=(voteStore[key]||0)+1;
localStorage.setItem("atomic_votes",JSON.stringify(voteStore));
const btn=document.querySelector("#vote-"+idx+" .vote-btn."+dir);
btn.classList.add(dir==="up"?"upvoted":"downvoted");
const count=btn.parentElement.querySelector(".vote-count");
count.textContent=voteStore[key];
}
</script>
